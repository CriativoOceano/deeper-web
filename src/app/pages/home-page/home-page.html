<app-shell>
  @if (!splashDismissed()) {
    <div
      class="splash"
      [class.splash--phase2]="splashPhase() >= 2"
      [class.splash--exit]="splashPhase() === 3"
      role="dialog"
      aria-modal="true"
      aria-labelledby="splash-line1"
    >
      <div class="splash__noise" aria-hidden="true"></div>
      <div class="splash__vignette" aria-hidden="true"></div>
      <div class="splash__orb splash__orb--a" aria-hidden="true"></div>
      <div class="splash__orb splash__orb--b" aria-hidden="true"></div>
      <div class="splash__grid" aria-hidden="true"></div>
      <div class="splash__scan" aria-hidden="true"></div>

      <div class="splash__stage">
        <div class="splash__block splash__block--1">
          <p id="splash-line1" class="splash__line splash__line--hero" data-shine="O futuro é mais profundo">
            O futuro é mais profundo
          </p>
        </div>
        <div class="splash__block splash__block--2">
          <p class="splash__line splash__line--cta" aria-live="polite">
            <span class="splash__cta-prefix">Vem ser</span>
            <span class="splash__cta-deeper" data-shine="DEEPER">DEEPER</span>
          </p>
        </div>
      </div>
    </div>
  }
  <app-glass-header />
  <a
    class="back-to-top glass-panel"
    [class.back-to-top--visible]="!isAtTop()"
    [attr.aria-hidden]="isAtTop() ? 'true' : 'false'"
    href="#top"
    aria-label="Voltar ao topo"
    title="Voltar ao topo"
  >
    <span aria-hidden="true">↑</span>
  </a>
  <main>
    <app-hero />
    <app-about />
    <section class="vibe-break" aria-label="Identidade Deeper">
      <div class="section__inner vibe-break__inner">
        <p class="vibe-break__word vibe-break__word--deeper" data-word="DEEPER">DEEPER</p>
        <p class="vibe-break__word vibe-break__word--jesus" data-word="JESUS">JESUS</p>
      </div>
    </section>
    <app-purpose />
    <section class="energy-divider" aria-hidden="true">
      <div class="section__inner energy-divider__inner">
        <span></span>
      </div>
    </section>
    <app-events />
    <app-final-cta />
  </main>
  <app-site-footer />
</app-shell>
